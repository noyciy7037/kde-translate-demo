name: Sync Pontoon

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-pontoon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: 'mozilla/pontoon'
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version-file: '.python-version'
      - name: Install libs
        run: sudo apt-get update && sudo apt-get install libpq-dev libxml2-dev libxslt-dev -y
      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt
      - name: Run Python
        run: python manage.py sync_projects
